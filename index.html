
<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>木偶奇遇记 - 童心奇遇馆 | 书信与知识树画廊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Comic Neue', 'Chalkboard SE', 'Comic Sans MS', cursive, sans-serif;
            background: #fef5e7;
            background-image: radial-gradient(circle at 10% 20%, rgba(255,215,150,0.2) 2%, transparent 2.5%),
                              radial-gradient(circle at 80% 70%, rgba(210,180,140,0.2) 1.5%, transparent 2%);
            background-size: 40px 40px, 35px 35px;
            color: #3e2a1f;
            position: relative;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 30px;
        }

        /* 头部与角色贴图 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .header h1 {
            font-size: 3.2rem;
            background: linear-gradient(135deg, #c78a3b, #e0a878, #b5622e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 4px 4px 12px rgba(0,0,0,0.1);
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.2rem;
            background: #f7e3c0;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            margin-top: 8px;
        }

        .character-strip {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin: 30px 0 20px;
        }

        .character-card {
            background: #fff9ef;
            border-radius: 60px 60px 40px 40px;
            padding: 12px 18px 8px 18px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
            text-align: center;
            width: 110px;
            border: 2px solid #f1cf94;
        }

        .character-card:hover {
            transform: translateY(-5px);
        }

        .character-emoji {
            font-size: 3.2rem;
        }

        .character-name {
            font-weight: bold;
            margin-top: 8px;
            color: #b45f2b;
        }

        /* 导航标签 (三个分页) */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0 25px;
            border-bottom: 3px solid #e9cca6;
            padding-bottom: 12px;
            flex-wrap: wrap;
        }

        .nav-link {
            font-size: 1.4rem;
            font-weight: bold;
            text-decoration: none;
            color: #8b5a2b;
            padding: 8px 24px;
            border-radius: 40px;
            transition: all 0.2s;
            background: #fce9cf;
            display: inline-block;
            cursor: pointer;
        }

        .nav-link.active {
            background: #d99345;
            color: white;
            box-shadow: 0 4px 10px rgba(185, 95, 20, 0.3);
        }

        .nav-link:hover:not(.active) {
            background: #f7d9ae;
            color: #6b3e1a;
        }

        /* 页面容器 */
        .page {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .active-page {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* 通用区域样式 */
        .section-title {
            font-size: 2rem;
            border-left: 12px solid #e29c45;
            padding-left: 20px;
            margin-bottom: 25px;
            font-weight: bold;
            color: #5f3a1a;
        }

        /* 思维导图网格 (画廊) */
        .mindmap-gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 35px;
            margin-top: 20px;
        }

        .mindmap-item {
            background: #f5ead9;
            border-radius: 32px;
            padding: 16px;
            width: 280px;
            text-align: center;
            transition: all 0.2s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .mindmap-img {
            width: 100%;
            height: auto;
            border-radius: 24px;
            border: 3px solid #eab668;
            transition: 0.2s;
            background: #f0e0c0;
        }

        .mindmap-item p {
            margin-top: 12px;
            font-weight: 600;
            color: #9b5e2c;
        }

        /* 书信卡片区域 */
        .letters-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin-top: 20px;
        }

        .letter-card {
            background: #fffef7;
            width: 320px;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border: 1px solid #ffddb0;
        }

        .letter-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 18px 35px rgba(0,0,0,0.15);
        }

        .letter-header {
            background: #f1d5a6;
            padding: 15px 20px;
            font-weight: bold;
            font-size: 1.3rem;
            color: #5c3516;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px dashed #dba459;
        }

        .letter-preview {
            padding: 20px;
            line-height: 1.5;
            color: #3c2a1c;
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #fffaf2;
            min-height: 180px;
        }

        .read-more {
            display: inline-block;
            background: #e2b87a;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            margin: 10px 20px 20px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .read-more:hover {
            background: #c57f3a;
        }

        .role-badge {
            background: #d9a066;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-block;
            margin-left: 8px;
        }

        /* 全屏遮罩层 (点击放大) */
        .fullscreen-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            cursor: pointer;
        }
        .fullscreen-overlay.active {
            display: flex;
        }
        .fullscreen-overlay img {
            max-width: 92%;
            max-height: 92%;
            border: 6px solid #eab668;
            border-radius: 28px;
            box-shadow: 0 0 40px rgba(218, 165, 32, 0.6);
            background: #2e241a;
            object-fit: contain;
        }

        /* 书信详细模态框 */
        .letter-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        .letter-modal-overlay.active {
            display: flex;
        }
        .letter-modal-card {
            background: #fff5e6;
            max-width: 600px;
            width: 85%;
            border-radius: 48px;
            padding: 28px;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        .letter-modal-card h2 {
            color: #b56327;
            border-bottom: 2px solid #efcd91;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .letter-modal-card p {
            margin: 16px 0;
            line-height: 1.6;
            font-size: 1.05rem;
        }
        .close-letter-btn {
            background: #d1843b;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
        }

        /* 超链接样式 + 更多按钮 */
        .more-link-btn {
            background: #d99345;
            display: inline-block;
            padding: 12px 28px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            margin-top: 20px;
        }
        .more-link-btn:hover {
            background: #b45f2a;
            transform: scale(1.02);
        }
        .center-btn {
            text-align: center;
            margin: 30px 0 10px;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            color: #b48957;
            border-top: 2px dashed #ebcea8;
            font-size: 0.9rem;
        }

        @media (max-width: 680px) {
            .container {
                padding: 15px;
            }
            .nav-link {
                font-size: 1.1rem;
                padding: 6px 16px;
            }
            .section-title {
                font-size: 1.6rem;
            }
        }
        .pinocchio-bg {
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%23f4cda6" d="M50,15 L57,35 L78,35 L62,48 L69,68 L50,56 L31,68 L38,48 L22,35 L43,35 Z"/><circle cx="50" cy="50" r="5" fill="%23bc8f4b"/></svg>');
            background-repeat: repeat;
            opacity: 0.05;
            position: fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>

    // 书信数据 (6封)
    const lettersData = [
{ id: 1, author: "邱信", role: "科洛迪先生", title: "写给《木偶奇遇记》的作者", preview: "你的想象力让我非常震惊，尤其是木头会讲话那一段。我笑得合不拢嘴...", fullContent: "亲爱的科洛迪先生：\n\n你的想象力让我非常震惊，尤其是木头会讲话那一段。我笑得合不拢嘴。两个老头在那里争吵，写得很生动。好像那一段没有一个字是没用的。\n\n其中，有一些角色的遭遇让我感到悲伤。他就是匹诺曹的爸爸。他用唯一的保暖工具为匹诺曹换来了一本课本，但是匹诺曹为了自己的好奇心把那本课本换了一张门票。他还因为这差点丢了性命。如果我是匹诺曹的爸爸，我会不会感到我是不是不该这么为了匹诺曹而不顾一切。\n\n这本书有很多人来劝阻匹诺曹，但能成功劝阻匹诺曹的只有小仙女。小仙女用过人的智慧让匹诺曹吃药，干活。特别是小仙女让匹诺曹吃药那一段。那一段，小仙女找到了匹诺曹怕死的特点，让匹诺曹乖乖吃药。我以后也要像小仙女学习。\n\n读完这一本书，我有很多的疑问。比如：\"小仙女要匹诺曹上学之前，匹诺曹知不知道自己去学校去干什么，为什么匹诺曹要结交比较调皮的学生做朋友？\"\n\n祝身体健康！\n\n读者邱信\n\n2026年4月6日" },

{ id: 2, author: "庄雅希", role: "科洛迪先生", title: "致《小木偶奇遇记》的作者", preview: "读完了《小木偶奇遇记》，我印象很深刻，而且觉得特别有趣！合上书的时候，我还久久沉浸在匹诺曹冒险的故事里...", fullContent: "亲爱的科洛迪先生：\n\n您好！\n\n读完了《小木偶奇遇记》，我印象很深刻，而且觉得特别有趣！合上书的时候，我还久久沉浸在匹诺曹冒险的故事里，忍不住一遍又一遍回想那精彩的情节。\n\n首先，我印象最深的，就是\"撒谎鼻子就变长\"的绝妙设定。当匹诺曹第一次对着蓝发仙女撒谎，鼻子就一点点在变，但在匹诺曹说完他最后一个谎言后，他的鼻子长得连门都出不去了，这个画面我一想起来就忍俊不禁，更让我明白了诚实的可贵，给了我深深的启迪。\n\n这份启迪也指引着我今后的生活。在学习上，我要诚实对待每一次作业，不抄袭、不敷衍；在和同学相处时，我要诚实对待朋友。就像匹诺曹最终因为诚实收获了幸福一样，我相信，只要保持诚实的品质，不仅能避免\"鼻子变长\"那样的小麻烦，更能收获老师的喜爱、同学的友谊，这会是我成长路上最好的财富。\n\n其次，书中讲述的\"奇迹种金币\"也非常精彩。狐狸和猫骗匹诺曹把金币埋在土里，就能长出满树金币，这个情节既写出了贪心的可笑，又充满了童话的趣味；还有贪玩的孩子去了\"玩具岛\"就会变成驴子，被卖到马戏团受苦，这个夸张的惩罚给我带了警醒。因为贪心会让人失去理智，总想着不劳而获，最终只会竹篮打水一场空。\n\n最后，谢谢您写出这么棒的故事，让我收获了很多道理，时刻提醒我要做一个诚实、勤奋、不贪心、不贪玩的好孩子。\n\n庄雅希\n\n2026年4月7日" },

{ id: 3, author: "邓熙晋", role: "匹诺曹", title: "致匹诺曹的一封信", preview: "我是一名和你一样，喜欢冒险、也偶尔会犯小错误的小学四年级小朋友，最近我读完了你的奇遇故事，心里有好多话想对你说...", fullContent: "亲爱的匹诺曹：\n\n我是一名和你一样，喜欢冒险、也偶尔会犯小错误的小学四年级小朋友，最近我读完了你的奇遇故事，心里有好多话想对你说，所以就提笔给你写了这封信，希望你能收到我的心意。\n\n说实话，一开始读你的故事的时候，我觉得你真的太调皮、太任性了，有时候甚至有点生气。你明明有善良的爸爸，为了给你做课本，卖掉了自己唯一的外套，还辛辛苦苦地照顾你，可你却不听爸爸的话，偷偷逃学，跑去看马戏，把爸爸的心血抛在脑后；你还有温柔的蓝发仙女，一次次原谅你的错误，耐心地教导你，可你却一次次说谎欺骗她，看着你的鼻子越变越长，我都替你着急，也想对你说：匹诺曹，别再撒谎了，诚实一点吧！还有小蟋蟀，它一直真心实意地劝告你，让你好好学习、孝敬爸爸，可你却不耐烦地把它赶走，甚至想伤害它，那时候我真的觉得你太不懂事了。\n\n后来，看到你被狐狸和猫欺骗，卖掉了课本，还被抓起来，我又有点心疼你；看到你因为贪玩，去了玩具国，每天只顾着玩，不学习、不干活，最后变成了一头驴子，被人卖掉，受尽了苦难，我更是替你难过，心里默默想：匹诺曹，你快醒醒吧，别再贪玩了，赶紧回到爸爸和仙女姐姐身边吧！\n\n不过，让我开心的是，你终于慢慢醒悟了。当你得知爸爸为了找你，不顾危险，乘船去寻找，最后被困在大鲸鱼的肚子里时，你再也不是那个调皮任性的小木偶了。你变得勇敢、坚强，不顾一切地去救爸爸，哪怕遇到再多的困难，哪怕要面对汹涌的大海和可怕的大鲸鱼，你也没有退缩。你努力地干活赚钱，弥补自己之前的错误，不再说谎、不再贪玩，认真学习、孝敬爸爸，一点点改掉了自己所有的坏毛病。当我读到你最后变成一个真正的小男孩，和爸爸幸福地生活在一起的时候，我真的太为你开心了，也忍不住为你鼓掌！\n\n匹诺曹，从你的故事里，我学到了很多道理。我知道，每个人都会犯错，就像我有时候也会偷懒、会撒谎，会让爸爸妈妈和老师操心，但是，犯错并不可怕，可怕的是犯错之后不承认、不改正。你用自己的经历告诉我们：只要勇于承认错误，努力改正错误，就能变成更好的自己。\n\n我也想对你说，以后不要再犯之前的错误啦，要一直做一个诚实、懂事、勇敢、善良的好孩子，好好孝敬爸爸，珍惜仙女姐姐对你的关爱，认真学习，不再贪玩。我也会向你学习，改掉自己的小毛病，上课认真听讲，按时完成作业，孝敬爸爸妈妈，尊敬老师，团结同学，做一个让大家喜欢的好孩子。\n\n不知道你现在过得开心吗？有没有一直保持着好习惯？希望你永远快乐、永远善良，和爸爸一起过着幸福的生活，也希望我们都能在成长的路上，慢慢变成更好的自己！\n\n邓熙晋\n\n2026年4月7日" },

{ id: 4, author: "朱沁馨", role: "匹诺曹", title: "给匹诺曹的信", preview: "经历这段奇妙的旅程，让你懂得了什么道理？其实我觉得，在狐狸和猫欺骗你的时候，你就该多想一想...", fullContent: "亲爱的匹诺曹：\n\n你好！我读完《木偶奇遇记》这本书，觉得你是个特别棒的孩子，一路经历了那么多坎坷和考验，最终如愿变成了真正的人类小孩。我心中充满好奇，想和你聊一聊。\n\n经历这段奇妙的旅程，让你懂得了什么道理？其实我觉得，在狐狸和猫欺骗你的时候，你就该多想一想：既然五枚金币能够种出两千枚来，那为什么狐理它们不自己去种，反而要告诉你呢？不过，你身上也有格外耀眼的闪光点，尽管警犬在帮警察追你，但你依然还是毫不犹豫地救助了不会游泳的它。那次你做得特别好，值得点个大大的赞！正是这些勇敢、善良的行为让你的愿望成真——变成了真正的人！\n\n我特别好奇，在那之后你是否还有在上学时遇到布鲁诺他们吗？你的学校有发生什么新变化？不如换我来给你讲讲我的学校吧！我们的教学楼由紫、橙、白色相间组成，一座座高楼林立，满满的城市氛围。校园里还有宽广无边的操场，经常能看到许多小小的身影在上面飞奔，充满了欢声笑语。教室里，朗朗的读书声此起披伏，回荡在整个校园......\n\n除了上学，周末时我还经常和家人去户外放松。有时，我们在高山上徒步攀登，一步步向着山顶前行，虽然辛苦却很有成就感；有时，我们坐在青青的草坪上聊天、野餐，吹着微风，心情格外舒畅！真希望我能有更多时间和你一起聊天，聊聊成长烦恼和学习心得。最后，衷心祝愿你每天都快快乐乐，幸福顺遂！\n\n小读者：朱沁馨\n\n2026年4月6日" },

{ id: 5, author: "陈宇诚", role: "匹诺曹", title: "致匹诺曹：请不要再撒谎", preview: "刚读故事时，我被你一波三折的经历深深吸引，你的遭遇既惊险又让人揪心。而最让我印象深刻的，是你对善良的仙女撒谎这件事...", fullContent: "亲爱的匹诺曹：\n\n您好！\n\n我是民新学校四（6）班的陈宇诚。读完《木偶奇遇记》这本书，我特别激动，迫不及待想给你写这封信。\n\n刚读故事时，我被你一波三折的经历深深吸引，你的遭遇既惊险又让人揪心。而最让我印象深刻的，是你对善良的仙女撒谎这件事，这也是我最想和你说的话。\n\n你拿着金币开开心心想回家找爸爸，狡猾的狐狸和猫骗你说，把金币种在地里能长出更多金币。你一下子就相信了，就算会说话的蟋蟀好心提醒你，你也不听。你们约好半夜出发，可他们偷偷提前走了，你居然还没察觉不对劲，一心想着去种金币。后来路上遇到强盗，你都没发现，这就是狐狸和猫设下的圈套，他们就是想抢走你的金币。\n\n幸好善良的仙女救了你，还派小动物照顾你、给你喝药。仙女问你金币去哪了，你明明没丢，却脱口而出说\"丢了\"。你怎么能对救你的仙女撒谎呢？难道不怕仙女伤心吗？说谎的时候，你难道不脸红、不心虚吗？你一撒谎，鼻子就悄悄变长了，你都没感觉到吗？\n\n仙女问你金币丢在哪，你又撒谎说丢在森林里，鼻子变得更长了。仙女说要帮你去找，你慌了，又撒谎说喝药水时吞进肚子里了。这已经是你第三次撒谎了，鼻子长得连转头、抬头都做不到，看着真让人心疼。\n\n匹诺曹，我想告诉你，撒谎是不对的。说一句谎话，就要用更多谎话来圆，最后只会让自己更难堪，还会伤害关心你的人。\n\n不过看到故事最后，你改掉了坏毛病，变得懂事，还把金币送给生病的仙女，最终变成了真正的小孩子，我真为你开心！\n\n希望你永远记住：做人一定要诚实守信，做一个勇敢、善良、诚实的好孩子！\n\n祝你天天开心，健康成长！\n\n陈宇诚\n\n2026年4月5日" },

{ id: 6, author: "冯丹朗", role: "匹诺曹", title: "诚实是比金子还珍贵的东西", preview: "我还记得，你刚从木头变成小木偶的时候，总爱随口说谎。为了贪玩骗爸爸，为了逃避犯错骗仙女，每一次撒谎，你的鼻子就会不受控制地变长...", fullContent: "亲爱的匹诺曹：\n\n你好！我是来自民新小学四（6）班的冯丹朗，最近读完了你的故事，心里有好多话想对你说。\n\n我还记得，你刚从木头变成小木偶的时候，总爱随口说谎。为了贪玩骗爸爸，为了逃避犯错骗仙女，每一次撒谎，你的鼻子就会不受控制地变长，连门都出不去，还被小动物们嘲笑，你肯定觉得尴尬又难过吧？其实说谎的坏处远远不止鼻子变长哦。你总是欺骗信任你的人，大家心里会对你越来越失望，就算你后来说的是真话，别人也会怀疑你，不再信任你，这种被孤立的感觉，一定比鼻子变长更难受吧！而且说谎的时候，你心里肯定也是七上八下的，吃不好也玩不好，这样多郁闷啊！\n\n匹诺曹，我的爸爸妈妈对我说过：\"诚实是比金子还珍贵的东西\"。所以我想告诉你，做错事并不可怕，做错后能承认错误，主动改正，才是最勇敢的行为。诚实的孩子，会收获家人的疼爱、朋友的信任、老师的表扬，走到哪里都受大家欢迎，这种感觉才是最棒的呢！\n\n你后来改掉了说谎的坏毛病，变得诚实、懂事、有担当，最终才变成了真正的小男孩，这都是诚实带给你的礼物呀！\n\n希望你永远守住诚实的好品质，再也不说谎，每天都过得开心又幸福！\n\n冯丹朗\n\n2026年4月5日" },

    // ---------- 通用函数：生成思维导图卡片 (带点击放大) ----------
    function createMindmapCard(mindmap) {
        const cardDiv = document.createElement('div');
        cardDiv.className = 'mindmap-item';
        cardDiv.setAttribute('data-img-src', mindmap.imgUrl);
        cardDiv.innerHTML = `
            <img class="mindmap-img" src="${mindmap.imgUrl}" alt="${mindmap.title}">
            <p>${mindmap.title}</p>
            <small style="color:#a57134;">${mindmap.desc}</small>
        `;
        // 全局放大事件绑定 (由事件委托再巩固，但在初始化时单独监听也可，为了可靠统一注册)
        cardDiv.addEventListener('click', (e) => {
            e.stopPropagation();
            openFullscreenImage(mindmap.imgUrl);
        });
        return cardDiv;
    }

    // 打开全屏图片（思维导图放大器）
    function openFullscreenImage(imgUrl) {
        const overlay = document.getElementById('fullscreenOverlay');
        const fullImg = document.getElementById('fullscreenImage');
        if (imgUrl) {
            fullImg.src = imgUrl;
            overlay.classList.add('active');
        }
    }
    function closeFullscreenImage() {
        const overlay = document.getElementById('fullscreenOverlay');
        overlay.classList.remove('active');
        const fullImg = document.getElementById('fullscreenImage');
        if (fullImg) fullImg.src = '';
    }

    // 生成书信卡片
    function createLetterCard(letter) {
        const cardDiv = document.createElement('div');
        cardDiv.className = 'letter-card';
        let roleEmoji = "🧸";
        if (letter.role === "杰佩托") roleEmoji = "👴";
        else if (letter.role === "蟋蟀先生") roleEmoji = "🦗";
        else if (letter.role === "蓝仙女") roleEmoji = "🧚‍♀️";
        else if (letter.role === "狐狸和猫") roleEmoji = "🐱🦊";
        else roleEmoji = "🧸";
        
        cardDiv.innerHTML = `
            <div class="letter-header">
                <span>📝 ${roleEmoji}</span> ${letter.title} 
                <span class="role-badge">致 ${letter.role}</span>
            </div>
            <div class="letter-preview">
                <p><strong>${letter.author}</strong> 写道：</p>
                <p>${letter.preview}...</p>
            </div>
            <button class="read-more" data-id="${letter.id}">📖 阅读全文 ➤</button>
        `;
        const btn = cardDiv.querySelector('.read-more');
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            showLetterDetail(letter.id);
        });
        return cardDiv;
    }

    function showLetterDetail(letterId) {
        const letter = lettersData.find(l => l.id === letterId);
        if (!letter) return;
        const modalOverlay = document.getElementById('letterDetailOverlay');
        const titleElem = document.getElementById('modalLetterTitle');
        const contentDiv = document.getElementById('modalLetterContent');
        titleElem.innerHTML = `✉️ ${letter.author} 写给 ${letter.role} · 《${letter.title}》`;
        contentDiv.innerHTML = `
            <p style="white-space: pre-wrap;">${letter.fullContent}</p>
            <p style="margin-top: 16px; font-style: italic; color:#ab7c48;">—— 来自四年级 ${letter.author} 的纯真心意</p>
        `;
        modalOverlay.classList.add('active');
    }
    function closeLetterModal() {
        document.getElementById('letterDetailOverlay').classList.remove('active');
    }

    // 渲染主页内容 (精选思维导图前3个 + 精选书信前3)
    function renderHome() {
        const homeMindmaps = document.getElementById('home-mindmaps');
        const homeLetters = document.getElementById('home-letters');
        if (homeMindmaps) {
            homeMindmaps.innerHTML = '';
            const topThreeMinds = mindmapData.slice(0, 3);
            topThreeMinds.forEach(m => homeMindmaps.appendChild(createMindmapCard(m)));
        }
        if (homeLetters) {
            homeLetters.innerHTML = '';
            const topThreeLetters = lettersData.slice(0, 3);
            topThreeLetters.forEach(l => homeLetters.appendChild(createLetterCard(l)));
        }
    }

    // 渲染完整书信分页
    function renderFullLetters() {
        const container = document.getElementById('full-letters-list');
        if (!container) return;
        container.innerHTML = '';
        lettersData.forEach(letter => {
            container.appendChild(createLetterCard(letter));
        });
    }

    // 渲染完整知识树分页 (全部思维导图)
    function renderFullMindmaps() {
        const container = document.getElementById('full-mindmaps-list');
        if (!container) return;
        container.innerHTML = '';
        mindmapData.forEach(mind => {
            container.appendChild(createMindmapCard(mind));
        });
    }

    // 页面切换逻辑 (三个页面)
    let currentPage = 'home';
    function switchPage(pageId) {
        const homePage = document.getElementById('home-page');
        const lettersPage = document.getElementById('letters-page');
        const mindmapsPage = document.getElementById('mindmaps-page');
        const navLinks = document.querySelectorAll('.nav-link');
        
        // 隐藏所有页面
        homePage.classList.remove('active-page');
        lettersPage.classList.remove('active-page');
        mindmapsPage.classList.remove('active-page');
        
        if (pageId === 'home') {
            homePage.classList.add('active-page');
            navLinks[0].classList.add('active');
            navLinks[1].classList.remove('active');
            navLinks[2].classList.remove('active');
            // 确保主页内容渲染 (动态)
            renderHome();
        } else if (pageId === 'letters') {
            lettersPage.classList.add('active-page');
            navLinks[0].classList.remove('active');
            navLinks[1].classList.add('active');
            navLinks[2].classList.remove('active');
            renderFullLetters();
        } else if (pageId === 'mindmaps') {
            mindmapsPage.classList.add('active-page');
            navLinks[0].classList.remove('active');
            navLinks[1].classList.remove('active');
            navLinks[2].classList.add('active');
            renderFullMindmaps();
        }
        currentPage = pageId;
    }

    // 绑定导航与超链接按钮
    function bindEvents() {
        const navHome = document.querySelector('.nav-link[data-page="home"]');
        const navLetters = document.querySelector('.nav-link[data-page="letters"]');
        const navMindmaps = document.querySelector('.nav-link[data-page="mindmaps"]');
        if (navHome) navHome.addEventListener('click', () => switchPage('home'));
        if (navLetters) navLetters.addEventListener('click', () => switchPage('letters'));
        if (navMindmaps) navMindmaps.addEventListener('click', () => switchPage('mindmaps'));
        
        // 主页跳转按钮
        const toLetters = document.getElementById('toLettersPageBtn');
        const toMindmapPage = document.getElementById('toMindmapPageBtn');
        if (toLetters) toLetters.addEventListener('click', () => switchPage('letters'));
        if (toMindmapPage) toMindmapPage.addEventListener('click', () => switchPage('mindmaps'));
        
        // 书信分页返回主页
        const backHomeFromLetters = document.getElementById('backHomeFromLetters');
        if (backHomeFromLetters) backHomeFromLetters.addEventListener('click', () => switchPage('home'));
        const backHomeFromMindmaps = document.getElementById('backHomeFromMindmaps');
        if (backHomeFromMindmaps) backHomeFromMindmaps.addEventListener('click', () => switchPage('home'));
        
        // 关闭书信模态框
        const closeLetterBtn = document.getElementById('closeLetterDetailBtn');
        if (closeLetterBtn) closeLetterBtn.addEventListener('click', closeLetterModal);
        const letterModalOverlay = document.getElementById('letterDetailOverlay');
        if (letterModalOverlay) letterModalOverlay.addEventListener('click', (e) => {
            if (e.target === letterModalOverlay) closeLetterModal();
        });
    }

    // 额外处理由于动态生成的思维导图卡片已经自带放大监听，确保没有遗漏
    document.addEventListener('DOMContentLoaded', () => {
        renderHome();          // 主页内容 (3导图+3书信)
        renderFullLetters();   // 预加载书信页列表
        renderFullMindmaps();  // 预加载知识树全页
        bindEvents();
        // 初始时确保首页激活、其他分页隐藏
        const lettersDiv = document.getElementById('letters-page');
        const mindmapsDiv = document.getElementById('mindmaps-page');
        if(lettersDiv) lettersDiv.classList.remove('active-page');
        if(mindmapsDiv) mindmapsDiv.classList.remove('active-page');
        document.getElementById('home-page').classList.add('active-page');
        // 全局键盘Esc关闭放大
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeFullscreenImage();
                closeLetterModal();

        });
